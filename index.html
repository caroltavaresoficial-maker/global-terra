<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  
<title>Global Terra</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#0A1F44;
  --gold:#D4AF37;
  --gold-light:#E6C76E;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter', sans-serif;
  background:var(--navy);
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
}

/* LOGO */
.logo-wrap{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-g{
  width:42px;
  height:42px;
  border:1.5px solid var(--gold);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display',serif;
  font-weight:700;
  color:var(--gold);
}

.logo-text{
  display:flex;
  flex-direction:column;
}

.logo-name{
  font-family:'Playfair Display',serif;
  font-weight:700;
}

.logo-sub{
  font-size:10px;
  letter-spacing:2px;
  color:var(--gold);
}

/* MENU */
.nav-links{
  display:flex;
  gap:16px;
}

.nav-links a{
  text-decoration:none;
  color:white;
  font-size:12px;
  padding:8px 16px;
  border:1px solid rgba(255,255,255,0.3);
  text-transform:uppercase;
  transition:0.3s;
}

.nav-links a:hover{
  border-color:var(--gold);
  color:var(--gold);
}

/* BOTÃO FRANQUIA */
.nav-btn{
  border:1px solid var(--gold)!important;
  color:var(--gold)!important;
}

.nav-btn:hover{
  background:var(--gold);
  color:var(--navy)!important;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  padding:0 60px;
  position:relative;
}

.hero-text{
  max-width:600px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:48px;
  margin-bottom:20px;
}

.hero p{
  opacity:0.8;
  margin-bottom:20px;
}

/* STATS */
.hero-stats{
  position:absolute;
  bottom:40px;
  left:60px;
  display:flex;
  gap:60px;
}

.hstat .val{
  font-size:32px;
  color:var(--gold-light);
}

.hstat .lbl{
  font-size:12px;
  opacity:0.7;
}

</style>
</head>

<body>

<nav>
  <div class="logo-wrap">
    <div class="logo-g">G</div>
    <div class="logo-text">
      <div class="logo-name">GLOBAL TERRA</div>
      <div class="logo-sub">AGRO BUSINESS</div>
    </div>
  </div>

  <div class="nav-links">
    <a href="#">Sobre</a>
    <a href="#">Produtos</a>
    <a href="#">Franquias</a>
    <a href="#" class="nav-btn">Seja Franqueado</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-text">
    <h1>Alta performance no campo começa aqui</h1>
    <p>Tecnologia, nutrição e estratégia para produtividade agrícola de verdade.</p>
  </div>

  <div class="hero-stats">
    <div class="hstat">
      <div class="val">18+</div>
      <div class="lbl">Estados atendidos</div>
    </div>
    <div class="hstat">
      <div class="val">100%</div>
      <div class="lbl">Foco em resultado</div>
    </div>
    <div class="hstat">
      <div class="val">Hub</div>
      <div class="lbl">Inovação</div>
    </div>
  </div>
</section>

</body>
</html>
