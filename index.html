<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Global Terra</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
    }

    header {
      background: #0a1628;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
    }

    header img {
      height: 50px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      padding: 40px;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 20px;
      width: 250px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin-top: 15px;
    }

    section {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>

<header>
  <!-- SUA LOGO -->
  <img src="logo.png" alt="Global Terra">

  <nav>
    <a href="#">Sobre</a>
    <a href="#">Produtos</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section>
  <h1>Global Terra</h1>
  <p>Soluções inovadoras para o agro</p>
</section>

<div class="container">

  <div class="card">
    <img src="produto1.jpg">
    <h3>Produto 1</h3>
    <p>Descrição do produto</p>
  </div>

  <div class="card">
    <img src="produto2.jpg">
    <h3>Produto 2</h3>
    <p>Descrição do produto</p>
  </div>

  <div class="card">
    <img src="produto3.jpg">
    <h3>Produto 3</h3>
    <p>Descrição do produto</p>
  </div>

</div>

</body>
</html>
